name: andespace
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter_bloc: ^8.1.6
  dio: ^5.7.0
  flutter_svg: ^2.0.10
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1
  go_router: ^14.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600

    - family: ADLaMDisplay
      fonts:
        - asset: assets/fonts/ADLaMDisplay-Regular.ttf
          weight: 400
